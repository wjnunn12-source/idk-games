<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Skate 3D - Hitboxes Added</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    #info {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.5); padding: 10px;
      color: white; font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="info">
    <strong>Skate 3D Prototype</strong><br>
    W/S = Move • A/D = Turn • Space = Jump<br>
    Obstacles now have hitboxes
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x202020);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(300, 300),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Skateboard
    const boardGroup = new THREE.Group();
    const deck = new THREE.Mesh(
      new THREE.BoxGeometry(2.5, 0.1, 0.6),
      new THREE.MeshStandardMaterial({ color: 0x2222ff })
    );
    boardGroup.add(deck);

    boardGroup.position.set(0, 0.2, 0);
    scene.add(boardGroup);

    // Hitbox list
    const hitboxes = [];

    function addHitbox(mesh, w, h, d) {
      hitboxes.push({
        mesh,
        box: new THREE.Box3().setFromCenterAndSize(mesh.position, new THREE.Vector3(w, h, d))
      });
    }

    // Obstacles
    function addRamp(x, z) {
      const geo = new THREE.BoxGeometry(6, 3, 6);
      const mat = new THREE.MeshStandardMaterial({ color: 0x884400 });
      const ramp = new THREE.Mesh(geo, mat);
      ramp.position.set(x, 1.5, z);
      ramp.rotation.x = -Math.PI / 6;
      scene.add(ramp);

      addHitbox(ramp, 6, 3, 6);
    }

    function addFunbox(x, z) {
      const geo = new THREE.BoxGeometry(4, 1.5, 4);
      const mat = new THREE.MeshStandardMaterial({ color: 0x555555 });
      const box = new THREE.Mesh(geo, mat);
      box.position.set(x, 0.75, z);
      scene.add(box);

      addHitbox(box, 4, 1.5, 4);
    }

    function addRail(x, z) {
      const geo = new THREE.CylinderGeometry(0.1, 0.1, 8, 16);
      const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const rail = new THREE.Mesh(geo, mat);
      rail.rotation.x = Math.PI / 2;
      rail.position.set(x, 0.5, z);
      scene.add(rail);

      addHitbox(rail, 0.5, 0.5, 8);
    }

    function addBump(x, z) {
      const geo = new THREE.SphereGeometry(2, 16, 16);
      const mat = new THREE.MeshStandardMaterial({ color: 0x444444 });
      const bump = new THREE.Mesh(geo, mat);
      bump.position.set(x, 1, z);
      scene.add(bump);

      addHitbox(bump, 4, 4, 4);
    }

    addRamp(10, -10);
    addFunbox(-15, -5);
    addRail(0, -20);
    addBump(5, 15);
    addBump(-10, 18);

    // Movement
    const keys = {};
    let velocity = 0;
    let turnSpeed = 0;
    let verticalVelocity = 0;
    const maxSpeed = 0.15;
    const accel = 0.004;
    const friction = 0.96;
    const turnRate = 0.04;
    const gravity = -0.01;
    const jumpStrength = 0.22;
    let isGrounded = true;

    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup", e => keys[e.code] = false);

    function checkCollisions() {
      const boardBox = new THREE.Box3().setFromObject(boardGroup);

      for (const hb of hitboxes) {
        hb.box.setFromObject(hb.mesh);

        if (hb.box.intersectsBox(boardBox)) {
          // Simple collision response: stop movement
          velocity = 0;

          // Lift board onto obstacle if landing on top
          boardGroup.position.y = hb.box.max.y + 0.2;
          isGrounded = true;
        }
      }
    }

    function update() {
      if (keys["KeyW"]) velocity += accel;
      else if (keys["KeyS"]) velocity -= accel;
      else velocity *= friction;

      velocity = Math.max(Math.min(velocity, maxSpeed), -maxSpeed);

      if (keys["KeyA"]) turnSpeed = turnRate;
      else if (keys["KeyD"]) turnSpeed = -turnRate;
      else turnSpeed = 0;

      boardGroup.rotation.y += turnSpeed;

      const forward = new THREE.Vector3(0, 0, -1);
      forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), boardGroup.rotation.y);
      boardGroup.position.addScaledVector(forward, velocity);

      if (keys["Space"] && isGrounded) {
        verticalVelocity = jumpStrength;
        isGrounded = false;
      }

      if (!isGrounded) {
        verticalVelocity += gravity;
        boardGroup.position.y += verticalVelocity;

        if (boardGroup.position.y <= 0.2) {
          boardGroup.position.y = 0.2;
          verticalVelocity = 0;
          isGrounded = true;
        }
      }

      checkCollisions();

      const camOffset = new THREE.Vector3(0, 3, 7);
      camOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), boardGroup.rotation.y);
      camera.position.copy(boardGroup.position.clone().add(camOffset));
      camera.lookAt(boardGroup.position.x, boardGroup.position.y + 0.5, boardGroup.position.z);
    }

    function animate() {
      requestAnimationFrame(animate);
      update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
